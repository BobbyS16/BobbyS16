<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fadeArc" gradientUnits="userSpaceOnUse" x1="86" y1="0" x2="426" y2="0">
      <stop offset="0" stop-color="#F0EDE8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F0EDE8" stop-opacity="1"/>
      <stop offset="1" stop-color="#F0EDE8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="#0e0e0e"/>

  <!-- Arc supérieur qui s'estompe sur les côtés -->
  <path d="M 86 300 A 170 170 0 0 1 426 300" stroke="url(#fadeArc)" stroke-width="16" fill="none"/>

  <!-- Bouton central (couronne) -->
  <rect x="246" y="96" width="20" height="40" fill="#F0EDE8"/>
  <rect x="228" y="62" width="56" height="40" fill="#F0EDE8" rx="8"/>

  <!-- Bouton gauche, orienté radialement (-30°) -->
  <g transform="rotate(-30 171 153)">
    <rect x="164" y="127" width="14" height="26" fill="#F0EDE8"/>
    <rect x="146" y="87" width="50" height="40" fill="#F0EDE8" rx="7"/>
  </g>

  <!-- Bouton droit, orienté radialement (+30°) -->
  <g transform="rotate(30 341 153)">
    <rect x="334" y="127" width="14" height="26" fill="#F0EDE8"/>
    <rect x="316" y="87" width="50" height="40" fill="#F0EDE8" rx="7"/>
  </g>

  <!-- Lettres PR en Impact italique -->
  <text x="198" y="400" font-family="Impact, 'Haettenschweiler', 'Arial Narrow Bold', sans-serif" font-weight="900" font-style="italic" font-size="280" fill="#F0EDE8" text-anchor="middle">P</text>
  <text x="314" y="400" font-family="Impact, 'Haettenschweiler', 'Arial Narrow Bold', sans-serif" font-weight="900" font-style="italic" font-size="280" fill="#E63946" text-anchor="middle">R</text>
</svg>
