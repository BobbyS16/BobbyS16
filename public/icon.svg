<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fadeArc" gradientUnits="userSpaceOnUse" x1="56" y1="0" x2="456" y2="0">
      <stop offset="0" stop-color="#F0EDE8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F0EDE8" stop-opacity="1"/>
      <stop offset="1" stop-color="#F0EDE8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="#0e0e0e"/>

  <!-- Arc superieur plus large r=200 -->
  <path d="M 56 300 A 200 200 0 0 1 456 300" stroke="url(#fadeArc)" stroke-width="18" fill="none"/>

  <!-- Bouton central -->
  <rect x="246" y="66" width="20" height="40" fill="#F0EDE8"/>
  <rect x="228" y="32" width="56" height="40" fill="#F0EDE8" rx="8"/>

  <!-- Bouton gauche (-30°) -->
  <g transform="rotate(-30 156 127)">
    <rect x="149" y="101" width="14" height="26" fill="#F0EDE8"/>
    <rect x="131" y="61" width="50" height="40" fill="#F0EDE8" rx="7"/>
  </g>

  <!-- Bouton droit (+30°) -->
  <g transform="rotate(30 356 127)">
    <rect x="349" y="101" width="14" height="26" fill="#F0EDE8"/>
    <rect x="331" y="61" width="50" height="40" fill="#F0EDE8" rx="7"/>
  </g>

  <!-- PR italique recentré -->
  <g transform="matrix(1 0 -0.28 1 90 0)">
    <text x="180" y="410" font-family="'Avenir Next Condensed', 'Futura', Impact, sans-serif" font-weight="900" font-size="320" fill="#F0EDE8" text-anchor="middle">P</text>
    <text x="316" y="410" font-family="'Avenir Next Condensed', 'Futura', Impact, sans-serif" font-weight="900" font-size="320" fill="#E63946" text-anchor="middle">R</text>
  </g>
</svg>
