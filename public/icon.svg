<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fadeArc" gradientUnits="userSpaceOnUse" x1="86" y1="0" x2="426" y2="0">
      <stop offset="0" stop-color="#F0EDE8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F0EDE8" stop-opacity="1"/>
      <stop offset="1" stop-color="#F0EDE8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="#0e0e0e"/>

  <!-- Arc supérieur qui s'estompe sur les côtés -->
  <path d="M 86 300 A 170 170 0 0 1 426 300" stroke="url(#fadeArc)" stroke-width="16" fill="none"/>

  <!-- Bouton central (couronne) -->
  <rect x="246" y="96" width="20" height="40" fill="#F0EDE8"/>
  <rect x="228" y="62" width="56" height="40" fill="#F0EDE8" rx="8"/>

  <!-- Bouton gauche -->
  <rect x="158" y="128" width="14" height="26" fill="#F0EDE8"/>
  <rect x="140" y="92" width="50" height="40" fill="#F0EDE8" rx="7"/>

  <!-- Bouton droit -->
  <rect x="340" y="128" width="14" height="26" fill="#F0EDE8"/>
  <rect x="322" y="92" width="50" height="40" fill="#F0EDE8" rx="7"/>

  <!-- Lettres PR -->
  <text x="208" y="360" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="170" fill="#F0EDE8" text-anchor="middle">P</text>
  <text x="304" y="360" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="170" fill="#E63946" text-anchor="middle">R</text>
</svg>
